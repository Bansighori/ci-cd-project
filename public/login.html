<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #36d1dc, #5b86e5);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.box {
    background: white;
    padding: 30px;
    border-radius: 10px;
    text-align: center;
    animation: fadeIn 1s ease-in;
}
input {
    margin: 10px;
    padding: 10px;
    width: 200px;
}
button {
    padding: 10px;
    background: blue;
    color: white;
    border: none;
}
@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}
</style>
</head>

<body>

<div class="box">
    <h2>Login</h2>
    <input type="text" placeholder="Username"><br>
    <input type="password" placeholder="Password"><br>
    <button onclick="login()">Login</button>
</div>

<script>
function login() {
    window.location.href = "dashboard.html";
}
</script>

</body>
</html>

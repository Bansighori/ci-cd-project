<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    text-align: center;
}
.header {
    background: #333;
    color: white;
    padding: 15px;
}
.card {
    background: white;
    margin: 20px auto;
    padding: 20px;
    width: 300px;
    border-radius: 10px;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
    transition: transform 0.3s;
}
.card:hover {
    transform: scale(1.05);
}
</style>
</head>

<body>

<div class="header">
    <h1>📊 Dashboard</h1>
</div>

<div class="card">
    <h3>Server Status</h3>
    <p>✅ Running</p>
</div>

<div class="card">
    <h3>Deployment</h3>
    <p>🚀 Successful</p>
</div>

</body>
</html>

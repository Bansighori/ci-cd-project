<!DOCTYPE html>
<html>
<head>
    <title>My DevOps Website</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            text-align: center;
            color: white;
        }

        .box {
            margin-top: 100px;
        }

        .card {
            background: white;

            width: 300px;

        }

            background: purple;
            color: white;
            border: none;
            border-radius: 5px;
        }

</head>

<body>

<div class="box">
    <h1>🚀 My CI/CD Website</h1>
    <p>Deployed using Docker & AWS</p>

    <div class="card">
        <h3>Status</h3>
        <p>✅ Running Successfully</p>
        <button onclick="window.location.href='login.html'">Go to Login</button>
    </div>
</div>

</html>
